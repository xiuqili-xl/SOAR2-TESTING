# Site settings
course_name: Summer Open And Reproducible Research (SOAR²) Camp
course_description: 3-day intensive camp for UCSB undergraduate students on open and reproducible research

course_semester: "Sep 21-23, 2026"

url: "https://ucsb-library-research-data-services.github.io/"     # the base hostname & protocol for your site
baseurl: "/SOAR2"                                                 # the subpath of your site, e.g. /blog/

schoolname: "UCSB Library"
schoolurl: "https://www.library.ucsb.edu/"


# Repo information (for repo_source, use the format "username/repo")
repo_copyright: Copyright (c) 2017 Steven V. Miller; Copyright (c) 2026 Regents of the University of California
repo_license: MIT License
# hide link to GitHub repo during application process
# repo_source: ucsb-library-research-data-services/SOAR2


program_info: |
    SOAR² is developed in partnership by Research Data Services (UCSB Library) and the Office of Undergraduate Research and Creative Activities (URCA), with support from the Open Research Community Accelerator (ORCA).


# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
# google_analytics: UA-XXXXXXXX-X

### Do not change the followings unless you know what you are doing ###

# Build settings
markdown: kramdown

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%a %-m/%-d/%Y"
onlydateformat: "%-m/%-d/%Y"
timeformat: "%-I:%M %p"

timezone: America/Los_Angeles

future: true
collections:
    instructors:
        output: true
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false


defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
